# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: sacortesh/project-script-wizard
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/4044e2ba-45de-4ced-8b74-30902b618871/pkce
  auth_token_endpoint: /sites/4044e2ba-45de-4ced-8b74-30902b618871/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://thescriptwizard.netlify.app

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The post title displayed on the blog listing and detail pages."
      - label: "Description"
        name: "description"
        widget: "text"
        hint: "A short summary shown on the blog listing page and in SEO meta tags."
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
        hint: "Publication date used for sorting posts (newest first)."
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        default: []
        hint: "Comma-separated tags (e.g. scripting, python, linux)."
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Draft posts are hidden from the public blog listing."
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
        hint: "Optional hero image displayed at the top of the post."
        media_folder: "public/images/uploads"
        public_folder: "/images/uploads"
      - label: "Body"
        name: "body"
        widget: "markdown"
